<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой облачный проект</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px;
            background-color: #f4f9f9;
        }
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #f4b400;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #f4a000;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h3>Отправить заявку</h3>
        <form id="feedbackForm">
            <input type="text" id="userName" placeholder="Ваше имя" required>
            <input type="email" id="userEmail" placeholder="Ваш Email" required>
            <button type="submit">Отправить в облако</button>
        </form>
    </div>

    <script type="module">
        // Импортируем модули Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
        // !!! ДОБАВЛЕНЫ ИМПОРТЫ ДЛЯ FIRESTORE !!!
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // Твоя конфигурация веб-приложения Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDXWhI1YN5_iaAmowLVOBhQ0VvZc9r2JPQ",
            authDomain: "svinki-537bf.firebaseapp.com",
            projectId: "svinki-537bf",
            storageBucket: "svinki-537bf.firebasestorage.app",
            messagingSenderId: "154131271954",
            appId: "1:154131271954:web:88d09f1a9f7af0cf9d63cb",
            measurementId: "G-ZB1BVPBQNV"
        };

        // МЕТОД: АТОМАРНОЕ ОБНОВЛЕНИЕ (LIKES)
        window.processLike = async (id) => {
          const docRef = doc(db, "requests", id);
          try {
            await updateDoc(docRef, { likes: increment(1) });
          } catch (e) { console.error("Validation Error:", e.message); }
        };

                // МЕТОД: ЗАПИСЬ С ВАЛИДАЦИЕЙ
        document.getElementById('mainBtn').onclick = async () => {
          const btn = document.getElementById('mainBtn');
          btn.disabled = true;
          try {
            await addDoc(collection(db, "requests"), {
              name: document.getElementById('name').value,
              email: document.getElementById('email').value,
              likes: 0,
              timestamp: serverTimestamp()
            });
            document.getElementById('email').value = "";
          } catch (e) { alert("Ошибка безопасности: данные отклонены сервером."); }
          btn.disabled = false;
        };

        // МЕТОД: REAL-TIME СИНХРОНИЗАЦИЯ
        
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
          const feed = document.getElementById('feed');
          feed.innerHTML = "";
          snapshot.forEach((doc) => {
            const data = doc.data();
            feed.innerHTML += `
              <div class="post">
                <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '--'}</span>
                <b>${data.name}</b>
                <p style='margin: 5px 0;'>${data.email}</p>
                <button class='like-btn' onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
              </div>
            `;
          });
        });





        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app); // Если ты используешь Analytics
        const db = getFirestore(app); // Инициализация Firestore

        // Логика кнопки
        document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const nameInput = document.getElementById("userName").value;
            const emailInput = document.getElementById("userEmail").value;

            try {
                // Запись в коллекцию "requests"
                await addDoc(collection(db, "requests"), {
                    name: nameInput,
                    email: emailInput,
                    timestamp: new Date()
                });
                alert("Готово! Данные сохранены в Firebase.");
                document.getElementById("feedbackForm").reset();
            } catch (error) {
                console.error("Ошибка записи:", error);
                alert("Ошибка при отправке.");
            }
        });
    </script>
</body>
</html>
