<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Firebase</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,.05); }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button#mainBtn:hover { background: #0056b3; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 6px 12px; border-radius: 20px; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 4px; }
        .action-btn:hover { background: #e2e6ea; }
        .delete-btn { color: #dc3545; }
        .delete-btn:hover { background: #f8d7da; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getFirestore, collection, addDoc, query, orderBy, onSnapshot,
            serverTimestamp, updateDoc, doc, increment, deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // ТВОИ КЛЮЧИ FIREBASE
        const firebaseConfig = {
          apiKey: "AIzaSy...",
          authDomain: "svinki-537bf.firebaseapp.com",
          projectId: "svinki-537bf",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ФУНКЦИИ УПРАВЛЕНИЯ ДАННЫМИ ---

        // 1. Добавление лайка
        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            await updateDoc(docRef, { likes: increment(1) });
        };

        // 2. Дизлайк (уменьшение лайков)
        window.processDislike = async (id) => {
            const docRef = doc(db, "requests", id);
            await updateDoc(docRef, { likes: increment(-1) });
        };

        // 3. Изменение имени (редактирование)
        window.editName = async (id) => {
            const newName = prompt("Введите новое имя профиля:");
            if (newName && newName.trim() !== "") {
                const docRef = doc(db, "requests", id);
                await updateDoc(docRef, { name: newName });
            }
        };

        // 4. Удаление поста
        window.deletePost = async (id) => {
            const isConfirmed = confirm("Вы уверены, что хотите удалить этот пост?");
            if (isConfirmed) {
                const docRef = doc(db, "requests", id);
                await deleteDoc(docRef);
            }
        };

        // --- СОЗДАНИЕ НОВОГО ПОСТА ---
        document.getElementById('mainBtn').onclick = async () => {
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');

            if (!nameInput.value || !emailInput.value) {
                alert("Пожалуйста, заполните оба поля!");
                return;
            }

            await addDoc(collection(db, "requests"), {
                name: nameInput.value,
                email: emailInput.value,
                likes: 0,
                timestamp: serverTimestamp()
            });

            // Очищаем поля после отправки
            nameInput.value = '';
            emailInput.value = '';
        };

        // --- ОТОБРАЖЕНИЕ ЛЕНТЫ В РЕАЛЬНОМ ВРЕМЕНИ ---
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((docItem) => {
                const data = docItem.data();
                feed.innerHTML += `
                    <div class="post">
                        <b>${data.name}</b>
                        <p style="margin: 5px 0; color: #555;">${data.email}</p>
                        
                        <div class="actions">
                            <button class="action-btn" onclick="processLike('${docItem.id}')">👍 ${data.likes || 0}</button>
                            <button class="action-btn" onclick="processDislike('${docItem.id}')">👎</button>
                            <button class="action-btn" onclick="editName('${docItem.id}')">✏️ Изменить</button>
                            <button class="action-btn delete-btn" onclick="deletePost('${docItem.id}')">🗑️ Удалить</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
